AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: StayXL Serverless Backend (Go) - Multi-Table Design

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref StayXLUsersTable
        VILLAS_TABLE: !Ref StayXLVillasTable
        BOOKINGS_TABLE: !Ref StayXLBookingsTable
        OFFERS_TABLE: !Ref StayXLOffersTable
        BLOCKED_DATES_TABLE: !Ref StayXLBlockedDatesTable
        PAYMENTS_TABLE: !Ref StayXLPaymentsTable
        DATE_PRICING_TABLE: !Ref StayXLDatePricingTable
        STAYXL_ADMIN_SECRET_ID: !Ref StayXLAdminSecret # Fetch ADMIN_KEY during runtime

Resources:
  StayXLApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref StayXLUsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref StayXLVillasTable }
        - DynamoDBCrudPolicy: { TableName: !Ref StayXLBookingsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref StayXLOffersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref StayXLBlockedDatesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref StayXLPaymentsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref StayXLDatePricingTable }
        - Statement:
            - Effect: Allow
              Action: 'secretsmanager:GetSecretValue'
              Resource: !Ref StayXLAdminSecret
      Events:
        CatchAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: makefile

  StayXLUsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StayXLUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StayXLVillasTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StayXLVillas
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SlugIndex
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StayXLBookingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StayXLBookings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: villaId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserBookingsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: VillaBookingsIndex
          KeySchema:
            - AttributeName: villaId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StayXLOffersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StayXLOffers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: code
          KeyType: HASH

  StayXLBlockedDatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StayXLBlockedDates
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: villaId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: VillaBlockedIndex
          KeySchema:
            - AttributeName: villaId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StayXLPaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StayXLPayments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: bookingId
          AttributeType: S
        - AttributeName: razorpayOrderId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: BookingPaymentIndex
          KeySchema:
            - AttributeName: bookingId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: RazorpayOrderIndex
          KeySchema:
            - AttributeName: razorpayOrderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StayXLDatePricingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StayXLDatePricing
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: villaId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: VillaPricingIndex
          KeySchema:
            - AttributeName: villaId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  StayXLVillaImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "stayxl-villa-images-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: ['GET']
            AllowedOrigins: ['*']

  StayXLVillaImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StayXLVillaImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub "arn:aws:s3:::${StayXLVillaImagesBucket}/*"

  # Secrets Manager Resource
  StayXLAdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: "Admin Access Secret for StayXL"
      GenerateSecretString:
        SecretStringTemplate: '{ "ADMIN_KEY": "stayxl-admin-secret-2026" }'
        GenerateStringKey: "ADMIN_KEY"

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  
  VillaImagesBucket:
    Description: "S3 Bucket for Villa Images"
    Value: !Ref StayXLVillaImagesBucket
